          state.tourSetup.categories = checkedCats;
          const pairCatSelect = document.getElementById('pair-cat');
          if (pairCatSelect) {
            pairCatSelect.innerHTML = checkedCats.map(c => `<option>${c}</option>`).join('');
          }
        };
        document.querySelectorAll('.tour-setup-cat-chk').forEach(chk => chk.onchange = updateCats);
        updateCats();
        
        document.querySelectorAll('.tour-setup-court-chk').forEach(chk => {
          chk.onchange = () => {
            state.tourSetup.selectedCourts = Array.from(document.querySelectorAll('.tour-setup-court-chk:checked')).map(el => el.value);
          };
        });

        const pairsContainer = document.getElementById('tour-pairs-list');
        const renderPairs = () => {
          pairsContainer.innerHTML = '';
          if (state.tourSetup.pairs.length === 0) {
            pairsContainer.appendChild(el(`<div style="text-align:center; padding:12px; color:#8a877d; font-size:12px; font-style:italic;">Chưa có cặp đấu nào được ghép.</div>`));
            return;
          }
          state.tourSetup.pairs.forEach((p, idx) => {
            const row = el(`<div style="display:flex; justify-content:space-between; align-items:center; background:#FFF; border:1px solid #E3E0D6; padding:6px 12px; border-radius:6px; font-size:13px;">
              <div>
                <span style="font-weight:600; color:#1B4332;">${escapeHtml(p.name)}</span>
                <span class="bc-badge" style="background:#E6F1FB; color:#0C447C; font-size:11px; margin-left:6px;">${p.category}</span>
              </div>
              <button class="bc-btn danger small" style="padding:2px 8px; font-size:11px;" data-idx="${idx}">Xoá</button>
            </div>`);
            row.querySelector('button').onclick = () => {
              if (!confirm(`Bạn có chắc chắn muốn xóa cặp đấu "${p.name}" khỏi danh sách đăng ký giải?`)) return;
              state.tourSetup.pairs.splice(idx, 1);
              renderPairs();
            };
            pairsContainer.appendChild(row);
          });
        };
        renderPairs();

        const addPairBtn = document.getElementById('tour-add-pair-btn');
        if (addPairBtn) {
          addPairBtn.onclick = () => {
            const m1 = document.getElementById('pair-member1').value;
            const m2 = document.getElementById('pair-member2').value;
            const cat = document.getElementById('pair-cat').value;
            
            if (!m1 || !m2) { alert('Chọn thành viên.'); return; }
            if (m1 === m2) { alert('Không thể ghép cặp cùng một thành viên.'); return; }
            if (!cat) { alert('Chọn nội dung.'); return; }
            
            const p1 = state.members.find(x => x.id === m1);
            const p2 = state.members.find(x => x.id === m2);
            
            state.tourSetup.pairs.push({
              id: uid(),
              category: cat,
              name: `${p1.name} + ${p2.name}`,
              member1Id: m1,
              member2Id: m2
            });
            renderPairs();
          };
        }

        const startBtn = document.getElementById('tour-start-btn');
        if (startBtn) {
          startBtn.onclick = async () => {
            const name = state.tourSetup.name.trim();
            if (!name) { alert('Nhập tên giải đấu.'); return; }
            if (state.tourSetup.pairs.length < 4) { alert('Cần ít nhất 4 cặp để bắt đầu.'); return; }
            if (state.tourSetup.selectedCourts.length === 0) { alert('Chọn ít nhất 1 sân.'); return; }
            
            const groupsCount = parseInt(document.getElementById('tour-setup-groups-count').value, 10);
            const groups = {};
            const matches = [];

            state.tourSetup.categories.forEach(cat => {
              const catPairs = state.tourSetup.pairs.filter(p => p.category === cat);
              if (catPairs.length === 0) return;
              
              groups[cat] = {};
              const groupLetters = groupsCount === 2 ? ['A', 'B'] : ['A', 'B', 'C', 'D'];
              groupLetters.forEach(l => groups[cat][l] = []);
              
              const shuffled = catPairs.slice().sort(() => Math.random() - 0.5);
              shuffled.forEach((p, idx) => {
                const l = groupLetters[idx % groupLetters.length];
                groups[cat][l].push(p.id);
              });

              groupLetters.forEach(l => {
                const gPairs = groups[cat][l];
                for (let i = 0; i < gPairs.length; i++) {
                  for (let j = i + 1; j < gPairs.length; j++) {
                    matches.push({
                      id: uid(),
                      category: cat,
                      stage: 'group',
                      groupName: l,
                      pair1Id: gPairs[i],
                      pair2Id: gPairs[j],
                      score1: null,
                      score2: null,
                      courtId: null,
                      status: 'waiting'
                    });
                  }
                }
              });
            });

            const newTour = {
              id: uid(),
              name,
              status: 'playing',
              courtIds: state.tourSetup.selectedCourts.slice(0, state.tourSetup.courtsCount),
              categories: state.tourSetup.categories,
              pairs: state.tourSetup.pairs,
              groups,
              matches
            };

            // Điền trận đấu ban đầu vào các sân đấu có sẵn
            const availableCourts = newTour.courtIds.slice();
            let idx = 0;
            while (availableCourts.length > 0 && idx < newTour.matches.length) {
              const m = newTour.matches[idx];
              if (m.status === 'waiting') {
                m.courtId = availableCourts.shift();
                m.status = 'playing';
              }
              idx++;
            }

            const ok = await mutateTournaments(latest => latest.concat([newTour]));
            if (ok) {
              alert('Giải đấu đã chính thức khởi tranh!');
              render();
            } else {
              alert('Lỗi lưu trữ dữ liệu giải đấu.');
            }
          };
        }
      }, 0);
      return wrap;
    }

    // ---------------- PLAYING MODE ----------------
    state.viewTourCategory = state.viewTourCategory || activeTour.categories[0];
    const cat = state.viewTourCategory;

    const header = el(`<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; flex-wrap:wrap; gap:8px;">
      <div>
        <h2 style="font-size:18px; color:#1B4332; font-weight:600; font-family:'Oswald', sans-serif;">🏆 ${escapeHtml(activeTour.name)}</h2>
        <span class="bc-badge" style="background:#EAF3DE; color:#27500A; font-weight:600; font-size:11px; margin-top:2px;">🔥 ĐANG THI ĐẤU</span>
      </div>
      <div style="display:flex; align-items:center; gap:8px;">
        <select class="bc-select" id="tour-cat-selector" style="width:130px; padding:5px 8px; font-size:13px; font-weight:500;">
          ${activeTour.categories.map(c => `<option value="${c}" ${c===cat?'selected':''}>${c}</option>`).join('')}
        </select>
        ${canManage() ? `<button class="bc-btn danger small" id="tour-cancel-btn">Hủy giải</button>` : ''}
      </div>
    </div>`);
    wrap.appendChild(header);

    setTimeout(() => {
      const catSelector = document.getElementById('tour-cat-selector');
      if (catSelector) catSelector.onchange = (e) => { state.viewTourCategory = e.target.value; render(); };

      const cancelBtn = document.getElementById('tour-cancel-btn');
      if (cancelBtn) {
        cancelBtn.onclick = async () => {
          if (!confirm('Bạn có chắc chắn muốn hủy giải đấu này? Mọi lịch đấu và bảng xếp hạng hiện tại sẽ bị xóa sạch.')) return;
          const ok = await mutateTournaments(latest => latest.filter(t => t.id !== activeTour.id));
          if (ok) {
            alert('Đã hủy giải đấu.');
            render();
          }
        };
      }
    }, 0);

    // --- PHẦN 1: TRỰC TIẾP CÁC SÂN ĐẤU (LIVE COURTS PANEL) ---
    const courtsPanel = el(`<div class="bc-card">
      <h3 style="font-size:15px; color:#1B4332; font-family:'Oswald', sans-serif; margin-bottom:12px; display:flex; align-items:center; gap:6px;">📺 TRỰC TIẾP CÁC SÂN ĐẤU</h3>
      <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap:12px;" id="tour-live-courts"></div>
    </div>`);
    wrap.appendChild(courtsPanel);

    const courtsContainer = courtsPanel.querySelector('#tour-live-courts');
    activeTour.courtIds.forEach(cid => {
      const courtObj = state.courts.find(c => c.id === cid);
      const courtName = courtObj ? courtObj.name : 'Sân đấu';
      const m = activeTour.matches.find(match => match.courtId === cid && match.status === 'playing');

      let courtBoxHtml = '';
      if (m) {
        const titleText = m.stage === 'group' ? `Bảng ${m.groupName}` : m.roundLabel;
        courtBoxHtml = `<div class="bc-card" style="margin:0; padding:12px; border:1px solid #40916C; background:rgba(64,145,108,0.03); display:flex; flex-direction:column; justify-content:space-between; height:100%; min-height:140px;">
          <div>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
              <span style="font-weight:700; color:#1B4332; font-size:14px;">📍 ${escapeHtml(courtName)}</span>
              <span class="bc-badge" style="background:#E6F1FB; color:#0C447C; font-size:10px;">${titleText}</span>
            </div>
            <div style="font-size:13px; font-weight:600; color:#2C2C2A; line-height:1.4; margin-bottom:8px;">
              <div style="color:#1B4332;">🔵 ${escapeHtml(getPairName(activeTour, m.pair1Id))}</div>
              <div style="color:#854F0B; margin-top:2px;">🔴 ${escapeHtml(getPairName(activeTour, m.pair2Id))}</div>
            </div>
          </div>
          ${canManage() 
            ? `<div style="display:flex; gap:4px; align-items:center; border-top:1px dashed rgba(64,145,108,0.2); padding-top:8px;">
                <input class="bc-input" type="number" min="0" id="score-p1-${m.id}" placeholder="🔵" style="width:45px; padding:4px; text-align:center; height:26px; font-size:12px;" />
                <span style="font-size:12px; color:#8a877d;">-</span>
                <input class="bc-input" type="number" min="0" id="score-p2-${m.id}" placeholder="🔴" style="width:45px; padding:4px; text-align:center; height:26px; font-size:12px;" />
                <button class="bc-btn small" id="save-score-btn-${m.id}" style="padding:4px 8px; font-size:11px; margin-left:auto; background:#27500A; border-color:#27500A;">Lưu</button>
               </div>`
            : `<div style="font-size:11px; color:#8a877d; font-style:italic; border-top:1px dashed rgba(64,145,108,0.2); padding-top:6px;">Đang thi đấu...</div>`
          }
        </div>`;
      } else {
        courtBoxHtml = `<div class="bc-card" style="margin:0; padding:12px; border:1px dashed #D8D4C6; background:#FFF; display:flex; flex-direction:column; justify-content:center; align-items:center; min-height:140px; text-align:center; color:#8a877d; font-style:italic; font-size:13px;">
          <div>📍 ${escapeHtml(courtName)}</div>
          <div style="font-size:12px; margin-top:6px; color:#b0aca2;">Sân trống. Chờ trận đấu tiếp theo...</div>
        </div>`;
      }
      
      const courtBox = el(courtBoxHtml);
      courtsContainer.appendChild(courtBox);

      // Xử lý lưu điểm số cho Admin
      if (m && canManage()) {
        setTimeout(() => {
          const saveBtn = document.getElementById(`save-score-btn-${m.id}`);
          if (saveBtn) {
            saveBtn.onclick = async () => {
              const sc1 = parseInt(document.getElementById(`score-p1-${m.id}`).value, 10);
              const sc2 = parseInt(document.getElementById(`score-p2-${m.id}`).value, 10);
              
              if (isNaN(sc1) || isNaN(sc2)) { alert('Vui lòng nhập điểm số đầy đủ.'); return; }
              
              const ok = await mutateTournaments(latest => {
                const tour = latest.find(t => t.id === activeTour.id);
                if (!tour) return null;
                const matchObj = tour.matches.find(x => x.id === m.id);
                if (!matchObj) return null;
                
                // Lưu kết quả
                matchObj.score1 = sc1;
                matchObj.score2 = sc2;
                matchObj.status = 'done';

                // Điều phối hàng chờ: gán trận tiếp theo vào sân này
                const nextMatch = tour.matches.find(x => x.status === 'waiting');
                if (nextMatch) {
                  nextMatch.courtId = cid;
                  nextMatch.status = 'playing';
                }
                return latest;
              });
              
              if (ok) render();
            };
          }
        }, 0);
      }
    });

    // --- PHẦN 2: HÀNG CHỜ TRẬN ĐẤU (MATCH QUEUE) ---
    const waitingMatches = activeTour.matches.filter(m => m.status === 'waiting' && m.category === cat);
    const queueCard = el(`<div class="bc-card" style="margin-top:12px;">
      <h3 style="font-size:15px; color:#1B4332; font-family:'Oswald', sans-serif; margin-bottom:8px;">⏳ HÀNG CHỜ TRẬN ĐẤU (${waitingMatches.length})</h3>
      <div style="display:flex; flex-direction:column; gap:8px; max-height:200px; overflow-y:auto;" id="tour-match-queue"></div>
    </div>`);
    wrap.appendChild(queueCard);

    const queueContainer = queueCard.querySelector('#tour-match-queue');
    if (waitingMatches.length === 0) {
      queueContainer.appendChild(el(`<div style="font-size:12px; color:#8a877d; font-style:italic; text-align:center; padding:12px;">Không có trận đấu nào trong hàng chờ.</div>`));
    } else {
      waitingMatches.forEach((m, idx) => {
        const titleText = m.stage === 'group' ? `Bảng ${m.groupName}` : m.roundLabel;
        const row = el(`<div style="display:flex; justify-content:space-between; align-items:center; background:rgba(0,0,0,0.01); border:1px solid #E3E0D6; padding:6px 12px; border-radius:6px; font-size:12px;">
          <div>
            <span style="font-weight:600; color:#1B4332;">${escapeHtml(getPairName(activeTour, m.pair1Id))}</span>
            <span style="color:#8a877d; margin:0 4px;">vs</span>
            <span style="font-weight:600; color:#1B4332;">${escapeHtml(getPairName(activeTour, m.pair2Id))}</span>
          </div>
          <span class="bc-badge" style="background:#F1EFE8; color:#444441; font-size:10px; font-weight:600;">#${idx+1} · ${titleText}</span>
        </div>`);
        queueContainer.appendChild(row);
      });
    }

    // --- PHẦN 3: BẢNG XẾP HẠNG VÒNG BẢNG (STANDINGS) ---
    const groupKeys = Object.keys(activeTour.groups[cat] || {});
    if (groupKeys.length > 0) {
      const standingsCard = el(`<div class="bc-card" style="margin-top:12px;">
        <h3 style="font-size:15px; color:#1B4332; font-family:'Oswald', sans-serif; margin-bottom:12px;">📊 BẢNG XẾP HẠNG VÒNG BẢNG</h3>
        <div style="display:flex; flex-direction:column; gap:16px;" id="tour-standings"></div>
      </div>`);
      wrap.appendChild(standingsCard);

      const standingsContainer = standingsCard.querySelector('#tour-standings');
      groupKeys.forEach(l => {
        const groupPairs = activeTour.groups[cat][l];
        
        // Tính toán chỉ số cho từng cặp
        const pairStats = groupPairs.map(pid => {
          const stats = { pid, played: 0, won: 0, lost: 0, pts: 0, diff: 0 };
          const pMatches = activeTour.matches.filter(m => m.category === cat && m.stage === 'group' && m.groupName === l && m.status === 'done' && (m.pair1Id === pid || m.pair2Id === pid));
          
          pMatches.forEach(m => {
            stats.played++;
            const isP1 = m.pair1Id === pid;
            const myScore = isP1 ? m.score1 : m.score2;
            const oppScore = isP1 ? m.score2 : m.score1;
            
            stats.diff += (myScore - oppScore);
            if (myScore > oppScore) {
              stats.won++;
              stats.pts += 3;
            } else {
              stats.lost++;
            }
          });
          return stats;
        });

        // Sắp xếp: Điểm giảm dần, Hiệu số giảm dần
        pairStats.sort((a,b) => b.pts - a.pts || b.diff - a.diff);

        const groupTbl = el(`<div style="background:#FFF; border:1px solid #E3E0D6; border-radius:10px; padding:10px; overflow-x:auto;">
          <div style="font-weight:700; color:#1B4332; font-size:13px; margin-bottom:8px; display:flex; align-items:center; gap:6px;">🌐 BẢNG ${l}</div>
          <table style="width:100%; font-size:12px; border-collapse:collapse; min-width:320px;">
            <tr style="color:#8a877d; border-bottom:1px solid #EFEDE3; text-align:left;">
              <th style="padding:4px;">Hạng</th><th style="padding:4px;">Cặp đấu</th><th style="padding:4px; text-align:center;">Trận</th><th style="padding:4px; text-align:center;">T/B</th><th style="padding:4px; text-align:center;">Hiệu số</th><th style="padding:4px; text-align:right;">Điểm</th>
            </tr>
          </table>
        </div>`);
        
        const table = groupTbl.querySelector('table');
        pairStats.forEach((st, idx) => {
          const row = el(`<tr style="border-bottom:1px solid #F8F9FA;">
            <td style="padding:6px 4px; font-weight:600; color:${idx<2?'#27500A':'#8a877d'};">${idx+1}</td>
            <td style="padding:6px 4px; font-weight:500;">${escapeHtml(getPairName(activeTour, st.pid))}</td>
            <td style="padding:6px 4px; text-align:center;">${st.played}</td>
            <td style="padding:6px 4px; text-align:center;">${st.won}/${st.lost}</td>
            <td style="padding:6px 4px; text-align:center; color:${st.diff>=0?'#27500A':'#993C1D'};">${st.diff > 0 ? '+' : ''}${st.diff}</td>
            <td style="padding:6px 4px; text-align:right; font-weight:700; color:#1B4332;">${st.pts}</td>
          </tr>`);
          table.appendChild(row);
        });
        standingsContainer.appendChild(groupTbl);
      });
    }

    // --- PHẦN 4: SƠ ĐỒ NHÁNH LOẠI TRỰC TIẾP (KNOCKOUT BRACKET) ---
    const koMatches = activeTour.matches.filter(m => m.stage === 'knockout' && m.category === cat);
    const standingsFinished = activeTour.matches.filter(m => m.stage === 'group' && m.category === cat).every(m => m.status === 'done');

    const bracketCard = el(`<div class="bc-card" style="margin-top:12px;">
      <h3 style="font-size:15px; color:#1B4332; font-family:'Oswald', sans-serif; margin-bottom:12px;">🌳 NHÁNH ĐẤU LOẠI TRỰC TIẾP</h3>
      <div id="tour-bracket-area"></div>
    </div>`);
    wrap.appendChild(bracketCard);

    const bracketArea = bracketCard.querySelector('#tour-bracket-area');
    if (koMatches.length === 0) {
      // Vòng bảng đang đấu, chưa gán vòng loại trực tiếp
      bracketArea.appendChild(el(`<div style="text-align:center; padding:15px; color:#8a877d; font-size:12px; font-style:italic;">
        Đang ở giai đoạn vòng bảng. ${standingsFinished && canManage() ? 'Bấm chốt vòng bảng bên dưới để bắt đầu xếp sơ đồ.' : 'Sơ đồ nhánh trực tiếp sẽ tự động kích hoạt sau khi vòng bảng kết thúc.'}
      </div>`));

      if (standingsFinished && canManage()) {
        const advanceBtn = el(`<button class="bc-btn" style="width:100%; margin-top:10px; background:#1B4332;">Kết Thúc Vòng Bảng & Xếp Nhánh Đấu Trực Tiếp 🚀</button>`);
        advanceBtn.onclick = async () => {
          // Tính toán Nhất Nhì của các bảng trong nội dung này
          const groupResults = {};
          groupKeys.forEach(l => {
            const groupPairs = activeTour.groups[cat][l];
            const pairStats = groupPairs.map(pid => {
              const stats = { pid, pts: 0, diff: 0 };
              const pMatches = activeTour.matches.filter(m => m.category === cat && m.stage === 'group' && m.groupName === l && (m.pair1Id === pid || m.pair2Id === pid));
              pMatches.forEach(m => {
                const isP1 = m.pair1Id === pid;
                const myScore = isP1 ? m.score1 : m.score2;
                const oppScore = isP1 ? m.score2 : m.score1;
                stats.diff += (myScore - oppScore);
                if (myScore > oppScore) stats.pts += 3;
              });
              return stats;
            });
            pairStats.sort((a,b) => b.pts - a.pts || b.diff - a.diff);
            groupResults[l] = pairStats.map(x => x.pid);
          });

          const newKoMatches = [];
          if (groupKeys.length === 4) {
            // Tứ kết (8 đội)
            newKoMatches.push({ id: uid(), category: cat, stage: 'knockout', roundLabel: 'Tứ Kết', pair1Id: groupResults['A'][0], pair2Id: groupResults['B'][1], score1: null, score2: null, courtId: null, status: 'waiting' }); // Tứ kết 1
            newKoMatches.push({ id: uid(), category: cat, stage: 'knockout', roundLabel: 'Tứ Kết', pair1Id: groupResults['C'][0], pair2Id: groupResults['D'][1], score1: null, score2: null, courtId: null, status: 'waiting' }); // Tứ kết 2
            newKoMatches.push({ id: uid(), category: cat, stage: 'knockout', roundLabel: 'Tứ Kết', pair1Id: groupResults['B'][0], pair2Id: groupResults['A'][1], score1: null, score2: null, courtId: null, status: 'waiting' }); // Tứ kết 3
            newKoMatches.push({ id: uid(), category: cat, stage: 'knockout', roundLabel: 'Tứ Kết', pair1Id: groupResults['D'][0], pair2Id: groupResults['C'][1], score1: null, score2: null, courtId: null, status: 'waiting' }); // Tứ kết 4
          } else {
            // Bán kết (4 đội, do giải quy mô chia 2 bảng)
            newKoMatches.push({ id: uid(), category: cat, stage: 'knockout', roundLabel: 'Bán Kết', pair1Id: groupResults['A'][0], pair2Id: groupResults['B'][1], score1: null, score2: null, courtId: null, status: 'waiting' }); // Bán kết 1
            newKoMatches.push({ id: uid(), category: cat, stage: 'knockout', roundLabel: 'Bán Kết', pair1Id: groupResults['B'][0], pair2Id: groupResults['A'][1], score1: null, score2: null, courtId: null, status: 'waiting' }); // Bán kết 2
          }

          const ok = await mutateTournaments(latest => {
            const tour = latest.find(t => t.id === activeTour.id);
            if (!tour) return null;
            
            // Nối tiếp trận đấu mới
            tour.matches = tour.matches.concat(newKoMatches);
            
            // Tự gán các trận knockout mới này vào các sân trống hiện có
            const emptyCourts = tour.courtIds.filter(cid => !tour.matches.some(m => m.courtId === cid && m.status === 'playing'));
            emptyCourts.forEach(cid => {
              const nextM = tour.matches.find(x => x.status === 'waiting');
              if (nextM) {
                nextM.courtId = cid;
                nextM.status = 'playing';
              }
            });
            return latest;
          });
          if (ok) render();
        };
        bracketArea.appendChild(advanceBtn);
      }
    } else {
      // Đã có trận vòng loại trực tiếp, render sơ đồ nhánh đấu trực quan
      const qfMatches = koMatches.filter(m => m.roundLabel === 'Tứ Kết');
      const sfMatches = koMatches.filter(m => m.roundLabel === 'Bán Kết');
      const fMatches = koMatches.filter(m => m.roundLabel === 'Chung Kết');
      const thirdMatches = koMatches.filter(m => m.roundLabel === 'Tranh hạng 3');

      const qfFinished = qfMatches.length === 0 || qfMatches.every(m => m.status === 'done');
      const sfFinished = sfMatches.length > 0 && sfMatches.every(m => m.status === 'done');
      const fFinished = fMatches.length > 0 && fMatches.every(m => m.status === 'done');

      // Tạo giao diện cột hiển thị dạng nhánh đấu
      const tree = el(`<div style="display:flex; gap:16px; align-items:center; overflow-x:auto; padding:10px 0;"></div>`);
      
      function renderBracketMatchBox(m) {
        const sc1 = m.score1 !== null ? m.score1 : '-';
        const sc2 = m.score2 !== null ? m.score2 : '-';
        let courtBadge = '';
        if (m.status === 'playing') {
          const cObj = state.courts.find(c => c.id === m.courtId);
          courtBadge = `<span style="font-size:9px; background:#EAF3DE; color:#27500A; padding:1px 4px; border-radius:3px; font-weight:700;">LIVE: ${cObj ? cObj.name : 'Sân'}</span>`;
        }
        
        return `<div style="background:#FFF; border:1px solid ${m.status==='done'?'#E3E0D6':'#40916C'}; border-radius:8px; padding:8px; min-width:180px; box-shadow:0 3px 6px rgba(0,0,0,0.03); display:flex; flex-direction:column; gap:4px;">
          <div style="font-size:10px; color:#8a877d; font-weight:600; display:flex; justify-content:space-between; align-items:center;">
            <span>${m.roundLabel}</span>
            ${courtBadge}
          </div>
          <div style="font-size:12px; display:flex; justify-content:space-between; font-weight:500; color:${m.status==='done' && m.score1>m.score2 ? '#27500A':'#2C2C2A'};">
            <span>${escapeHtml(getPairName(activeTour, m.pair1Id))}</span>
            <span style="font-weight:700;">${sc1}</span>
          </div>
          <div style="font-size:12px; display:flex; justify-content:space-between; font-weight:500; color:${m.status==='done' && m.score2>m.score1 ? '#27500A':'#2C2C2A'};">
            <span>${escapeHtml(getPairName(activeTour, m.pair2Id))}</span>
            <span style="font-weight:700;">${sc2}</span>
          </div>
        </div>`;
      }

      // Cột Tứ Kết
      if (qfMatches.length > 0) {
        const col = el(`<div style="display:flex; flex-direction:column; gap:20px; justify-content:space-around;"></div>`);
        qfMatches.forEach(m => col.appendChild(el(renderBracketMatchBox(m))));
        tree.appendChild(col);
      }

      // Cột Bán Kết
      if (sfMatches.length > 0) {
        const col = el(`<div style="display:flex; flex-direction:column; gap:40px; justify-content:space-around;"></div>`);
        sfMatches.forEach(m => col.appendChild(el(renderBracketMatchBox(m))));
        tree.appendChild(col);
      }

      // Cột Chung Kết
      if (fMatches.length > 0) {
        const col = el(`<div style="display:flex; flex-direction:column; gap:20px; justify-content:center;"></div>`);
        fMatches.forEach(m => col.appendChild(el(renderBracketMatchBox(m))));
        thirdMatches.forEach(m => col.appendChild(el(renderBracketMatchBox(m))));
        tree.appendChild(col);
      }

      bracketArea.appendChild(tree);

      // --- NÚT BẤM TIẾN VÒNG (NEXT STAGES POPULATE) ---
      if (canManage()) {
        const btnBox = el(`<div style="margin-top:12px; border-top:1px dashed #E3E0D6; padding-top:10px;"></div>`);
        
        if (qfMatches.length > 0 && qfFinished && sfMatches.length === 0) {
          const nextBtn = el(`<button class="bc-btn" style="width:100%;">Tạo Vòng Bán Kết 🚀</button>`);
          nextBtn.onclick = async () => {
            // Lấy người thắng từ 4 trận Tứ kết
            const w = qfMatches.map(m => m.score1 > m.score2 ? m.pair1Id : m.pair2Id);
            const newSf = [
              { id: uid(), category: cat, stage: 'knockout', roundLabel: 'Bán Kết', pair1Id: w[0], pair2Id: w[1], score1: null, score2: null, courtId: null, status: 'waiting' },
              { id: uid(), category: cat, stage: 'knockout', roundLabel: 'Bán Kết', pair1Id: w[2], pair2Id: w[3], score1: null, score2: null, courtId: null, status: 'waiting' }
            ];
            
            const ok = await mutateTournaments(latest => {
              const tour = latest.find(t => t.id === activeTour.id);
              if (!tour) return null;
              tour.matches = tour.matches.concat(newSf);
              
              // Gán sân trống tự động
              const emptyCourts = tour.courtIds.filter(cid => !tour.matches.some(x => x.courtId === cid && x.status === 'playing'));
              emptyCourts.forEach(cid => {
                const nextM = tour.matches.find(x => x.status === 'waiting');
                if (nextM) { nextM.courtId = cid; nextM.status = 'playing'; }
              });
              return latest;
            });
            if (ok) render();
          };
          btnBox.appendChild(nextBtn);
        } else if (sfFinished && fMatches.length === 0) {
          const nextBtn = el(`<button class="bc-btn" style="width:100%;">Tạo Vòng Chung Kết & Tranh Hạng 3 🚀</button>`);
          nextBtn.onclick = async () => {
            // Lấy người thắng & người thua từ 2 trận Bán kết
            const w = sfMatches.map(m => m.score1 > m.score2 ? m.pair1Id : m.pair2Id);
            const l = sfMatches.map(m => m.score1 > m.score2 ? m.pair2Id : m.pair1Id);
            
            const newF = [
              { id: uid(), category: cat, stage: 'knockout', roundLabel: 'Chung Kết', pair1Id: w[0], pair2Id: w[1], score1: null, score2: null, courtId: null, status: 'waiting' },
              { id: uid(), category: cat, stage: 'knockout', roundLabel: 'Tranh hạng 3', pair1Id: l[0], pair2Id: l[1], score1: null, score2: null, courtId: null, status: 'waiting' }
            ];

            const ok = await mutateTournaments(latest => {
              const tour = latest.find(t => t.id === activeTour.id);
              if (!tour) return null;
              tour.matches = tour.matches.concat(newF);
              
              // Gán sân trống tự động
              const emptyCourts = tour.courtIds.filter(cid => !tour.matches.some(x => x.courtId === cid && x.status === 'playing'));
              emptyCourts.forEach(cid => {
                const nextM = tour.matches.find(x => x.status === 'waiting');
                if (nextM) { nextM.courtId = cid; nextM.status = 'playing'; }
              });
              return latest;
            });
            if (ok) render();
          };
          btnBox.appendChild(nextBtn);
        } else if (fFinished) {
          const endBtn = el(`<button class="bc-btn" style="width:100%; background:#27500A; border-color:#27500A;">Bế Mạc & Trao Giải 🏆</button>`);
          endBtn.onclick = async () => {
            if (!confirm('Bạn có chắc chắn muốn kết thúc giải đấu? Dữ liệu giải đấu sẽ được lưu trữ và bế mạc.')) return;
            const ok = await mutateTournaments(latest => {
              const tour = latest.find(t => t.id === activeTour.id);
              if (!tour) return null;
              tour.status = 'finished';
              return latest;
            });
            if (ok) {
              alert('Bế mạc giải đấu thành công! Xin chúc mừng các đội đạt giải.');
              render();
            }
          };
          btnBox.appendChild(endBtn);
        }
        if (btnBox.children.length > 0) bracketCard.appendChild(btnBox);
      }
    }

    // --- HIỂN THỊ KẾT QUẢ PODIUM NẾU GIẢI ĐÃ KẾT THÚC ---
    const finishedTours = state.tournaments.filter(t => t.status === 'finished');
    if (finishedTours.length > 0) {
      finishedTours.forEach(t => {
        // Tìm trận chung kết và tranh hạng 3 của từng nội dung thi đấu
        const podiumCard = el(`<div class="bc-card" style="margin-top:16px; border:2px solid #D8973C; background:linear-gradient(135deg, rgba(254, 252, 243, 0.95) 0%, rgba(255, 255, 255, 0.95) 100%);">
          <h2 style="font-size:16px; color:#1B4332; font-weight:600; text-align:center; font-family:'Oswald', sans-serif; margin-bottom:12px;">🏆 KẾT QUẢ GIẢI ĐẤU: ${escapeHtml(t.name)}</h2>
          <div style="display:flex; flex-direction:column; gap:10px;" id="podium-cats-${t.id}"></div>
        </div>`);
        
        const podiumContainer = podiumCard.querySelector(`#podium-cats-${t.id}`);
        t.categories.forEach(category => {
          const finalMatch = t.matches.find(m => m.category === category && m.roundLabel === 'Chung Kết' && m.status === 'done');
          const thirdMatch = t.matches.find(m => m.category === category && m.roundLabel === 'Tranh hạng 3' && m.status === 'done');
          
          if (finalMatch) {
            const goldPair = finalMatch.score1 > finalMatch.score2 ? finalMatch.pair1Id : finalMatch.pair2Id;
            const silverPair = finalMatch.score1 > finalMatch.score2 ? finalMatch.pair2Id : finalMatch.pair1Id;
            let bronzePair = '';
            if (thirdMatch) {
              bronzePair = thirdMatch.score1 > thirdMatch.score2 ? thirdMatch.pair1Id : thirdMatch.pair2Id;
            }
            
            const catRow = el(`<div style="border:1px solid #E3E0D6; border-radius:8px; padding:10px; background:#FFF;">
              <div style="font-weight:700; color:#1B4332; font-size:13px; margin-bottom:6px; text-transform:uppercase;">🏸 Nội dung: ${category}</div>
              <div style="display:flex; flex-direction:column; gap:4px; font-size:12px;">
                <div style="font-weight:600; color:#B85C00; display:flex; align-items:center; gap:4px;">👑 Hạng 1 (Vàng): ${escapeHtml(getPairName(t, goldPair))}</div>
                <div style="font-weight:600; color:#495057; display:flex; align-items:center; gap:4px;">⭐ Hạng 2 (Bạc): ${escapeHtml(getPairName(t, silverPair))}</div>
                ${bronzePair ? `<div style="font-weight:600; color:#854F0B; display:flex; align-items:center; gap:4px;">🥉 Hạng 3 (Đồng): ${escapeHtml(getPairName(t, bronzePair))}</div>` : ''}
              </div>
            </div>`);
            podiumContainer.appendChild(catRow);
          }
        });
        
        wrap.appendChild(podiumCard);
      });
    }

    return wrap;
  }

  // ---------- SESSIONS ----------
  function renderSessions(){
    const wrap = el(`<div></div>`);
    const nowStamp = (new Date()).toISOString().slice(0,16).replace('T','');

    // 1. Tự động xóa thông báo hết hạn và kết quả thách đấu cũ khi hoạt động tiếp theo bắt đầu
    const todayStr = (new Date()).toISOString().slice(0, 10);
    state.announcements = state.announcements || [];
    const validAnnouncements = state.announcements.filter(a => {
      // Kiểm tra hạn ngày của thông báo thường
      if (a.expireDate && a.expireDate < todayStr) return false;
      
      // Kiểm tra kết quả thách đấu của buổi tập cũ
      if (a.isChallengeResult) {
        const sOfAnn = state.sessions.find(x => x.id === a.sessionId);
        if (!sOfAnn) return false; // Buổi tập gốc đã xóa -> xóa tin
        
        const annSessionStart = sOfAnn.date + (sOfAnn.time || '00:00');
        const hasNewerSessionStarted = state.sessions.some(otherS => {
          const otherStart = otherS.date + (otherS.time || '00:00');
          return otherStart > annSessionStart && otherStart <= nowStamp;
        });
        
        if (hasNewerSessionStarted) return false;
      }
      return true;
    });

    if (validAnnouncements.length !== state.announcements.length) {
      state.announcements = validAnnouncements;
      saveAnnouncements();
    }

    // --- RENDER BẢNG TIN THÔNG BÁO ---
    const showAnnounceFormKey = 'show_announce_form';
    const announceFormVisible = !!state[showAnnounceFormKey];
    
    const bulletinCard = el(`<div class="bc-card" style="border: 2px solid rgba(242, 100, 25, 0.4); background: linear-gradient(135deg, rgba(255, 253, 245, 0.95) 0%, rgba(255, 255, 255, 0.95) 100%);">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <h2 style="font-size:16px; color:#1B4332; font-weight:600; display:flex; align-items:center; gap:6px; font-family:'Oswald', sans-serif;">
          📢 BẢNG TIN CÂU LẠC BỘ
        </h2>
        ${canManage() ? `<button class="bc-btn small" id="ann-toggle-btn" style="padding:3px 8px; font-size:11px; font-weight:600;">
          ${announceFormVisible ? 'Đóng form' : '➕ Đăng tin'}
        </button>` : ''}
      </div>
      <div id="ann-form-container"></div>
      <div id="ann-list-container" style="display:flex; flex-direction:column; gap:10px; margin-top:8px;"></div>
    </div>`);

    // Form đăng thông báo dành cho Admin/R1
    if (canManage() && announceFormVisible) {
      const annForm = el(`<div style="background:var(--input-bg); border:1px solid var(--card-border); padding:12px; border-radius:10px; display:flex; flex-direction:column; gap:8px; margin-bottom:10px;">
        <div style="font-weight:600; font-size:13px; color:#1B4332;">✍️ ĐĂNG THÔNG BÁO MỚI</div>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; flex-wrap:wrap;">
          <div>
            <label style="font-size:11px; color:#8a877d; display:block; margin-bottom:2px;">Phân loại tin:</label>
            <select class="bc-select" id="ann-category" style="width:100%; padding:5px 8px; font-size:12px;">
              <option value="general">📢 Thông báo chung</option>
              <option value="alert">🚨 Cảnh báo quan trọng</option>
              <option value="match">🔥 Kèo giao lưu</option>
              <option value="party">🎉 Tin vui / Ăn chơi</option>
              <option value="tournament">🏆 Giải đấu / Sự kiện</option>
            </select>
          </div>
          <div>
            <label style="font-size:11px; color:#8a877d; display:block; margin-bottom:2px;">Ngày hết hạn (tự xóa):</label>
            <input class="bc-input" type="date" id="ann-expire" style="width:100%; padding:4px 6px; font-size:12px;" />
          </div>
        </div>

        <div>
          <label style="font-size:11px; color:#8a877d; display:block; margin-bottom:2px;">Tiêu đề:</label>
          <input class="bc-input" id="ann-title" placeholder="Ví dụ: Lịch đóng tiền quỹ tháng này" style="width:100%; padding:6px 8px; font-size:13px;" />
        </div>

        <div>
          <label style="font-size:11px; color:#8a877d; display:block; margin-bottom:2px;">Nội dung chi tiết:</label>
          <textarea class="bc-input" id="ann-content" placeholder="Nội dung thông báo chi tiết..." rows="3" style="width:100%; padding:6px 8px; font-family:inherit; font-size:13px; resize:vertical;"></textarea>
        </div>

        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; margin-top:4px;">
          <label style="display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:600; cursor:pointer; color:#B25E00;">
            <input type="checkbox" id="ann-pin" style="transform: scale(1.1);" />
            📌 Ghim tin lên đầu bảng
          </label>
          <button class="bc-btn small" id="ann-submit" style="padding:6px 16px; font-weight:600;">⚡ Đăng tin!</button>
        </div>
      </div>`);
      bulletinCard.querySelector('#ann-form-container').appendChild(annForm);
    }

    const CATEGORIES = {
      general: { label: 'Thông báo chung', icon: '📢', color: '#134074', bg: '#E6F1FB' },
      alert: { label: 'Cảnh báo quan trọng', icon: '🚨', color: '#993C1D', bg: '#FAECE7' },
      match: { label: 'Kèo giao lưu', icon: '🔥', color: '#B25E00', bg: '#FFF2E6' },
      party: { label: 'Tin vui / Ăn chơi', icon: '🎉', color: '#6A2A80', bg: '#F8EEFC' },
      tournament: { label: 'Giải đấu / Sự kiện', icon: '🏆', color: '#27500A', bg: '#EAF3DE' }
    };

    const formatDateTime = (ts) => {
      if (!ts) return 'N/A';
      const d = new Date(ts);
      const hrs = String(d.getHours()).padStart(2, '0');
      const mins = String(d.getMinutes()).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      const mon = String(d.getMonth() + 1).padStart(2, '0');
      const yr = d.getFullYear();
      return `${hrs}:${mins} ngày ${day}/${mon}/${yr}`;
    };

    // Danh sách thông báo
    const annListContainer = bulletinCard.querySelector('#ann-list-container');
    if (state.announcements.length === 0) {
      annListContainer.appendChild(el(`<div style="font-size:12px; color:#8a877d; text-align:center; padding:12px; font-style:italic;">Hôm nay chưa có thông báo mới nào từ Ban chủ nhiệm. 🌸</div>`));
    } else {
      const sortedAnnouncements = state.announcements.slice().sort((a, b) => {
        if (!!a.pinned !== !!b.pinned) {
          return a.pinned ? -1 : 1;
        }
        return (b.createdAt || 0) - (a.createdAt || 0);
      });

      sortedAnnouncements.forEach(a => {
        const cat = CATEGORIES[a.category || 'general'] || CATEGORIES.general;
        
        let borderStyle = '1px solid #E3E0D6';
        let cardBg = '#FAF8F5';
        let pinBadge = '';
        
        if (a.pinned) {
          borderStyle = '2px solid #D8973C';
          cardBg = 'linear-gradient(135deg, #FFFDF5 0%, #FFF9E6 100%)';
          pinBadge = `<span style="background:#FFF3D6; color:#B25E00; font-size:10px; font-weight:700; padding:2px 6px; border-radius:4px; border:1px solid #F3D29B; display:inline-flex; align-items:center; gap:2px;">📌 GHIM</span>`;
        }

        const heartList = (a.reactions && a.reactions.heart) || [];
        const thumbsList = (a.reactions && a.reactions.thumbs) || [];
        const fireList = (a.reactions && a.reactions.fire) || [];
        
        const myName = state.me ? state.me.name : 'Khách';
        const myReactedHeart = heartList.includes(myName);
        const myReactedThumbs = thumbsList.includes(myName);
        const myReactedFire = fireList.includes(myName);

        const item = el(`<div class="bc-card" style="background:${cardBg}; border:${borderStyle}; border-radius:12px; padding:12px; display:flex; flex-direction:column; gap:6px; position:relative; box-shadow: ${a.pinned ? '0 4px 10px rgba(216,151,60,0.1)' : 'none'};">
          <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:6px;">
            <div style="display:flex; align-items:center; gap:6px;">
              <span class="bc-badge" style="background:${cat.bg}; color:${cat.color}; font-weight:700; font-size:10px; padding:2px 8px; border:1px solid rgba(0,0,0,0.05);">
                ${cat.icon} ${cat.label}
              </span>
              ${pinBadge}
            </div>
            <span style="font-size:11px; color:#8a877d; font-style:italic;">📅 Đăng: ${formatDateTime(a.createdAt)}</span>
          </div>

          <div style="font-weight:700; font-size:14px; color:#1B4332; margin-top:2px;">
            ${escapeHtml(a.title)}
          </div>
          
          <div style="font-size:13px; color:#2C2C2A; line-height:1.45; white-space:pre-line;">
            ${escapeHtml(a.content)}
          </div>

          <div style="display:flex; justify-content:space-between; align-items:center; border-top:1px dashed #E3E0D6; padding-top:8px; margin-top:4px; flex-wrap:wrap; gap:8px;">
            <div style="display:flex; gap:6px; align-items:center;">
              <button class="bc-btn outline small" id="react-thumbs-${a.id}" style="padding:2px 8px; font-size:11px; display:inline-flex; align-items:center; gap:4px; background:${myReactedThumbs ? 'rgba(19,64,116,0.1)' : 'transparent'}; border-color:${myReactedThumbs ? '#134074' : '#C4C2B7'}; color:${myReactedThumbs ? '#134074' : '#6b7a73'}; font-weight:${myReactedThumbs ? 'bold' : 'normal'};">
                👍 <span>${thumbsList.length}</span>
              </button>
              <button class="bc-btn outline small" id="react-heart-${a.id}" style="padding:2px 8px; font-size:11px; display:inline-flex; align-items:center; gap:4px; background:${myReactedHeart ? 'rgba(230,10,10,0.08)' : 'transparent'}; border-color:${myReactedHeart ? '#E60A0A' : '#C4C2B7'}; color:${myReactedHeart ? '#E60A0A' : '#6b7a73'}; font-weight:${myReactedHeart ? 'bold' : 'normal'};">
                ❤️ <span>${heartList.length}</span>
              </button>
              <button class="bc-btn outline small" id="react-fire-${a.id}" style="padding:2px 8px; font-size:11px; display:inline-flex; align-items:center; gap:4px; background:${myReactedFire ? 'rgba(242,100,25,0.08)' : 'transparent'}; border-color:${myReactedFire ? '#F26419' : '#C4C2B7'}; color:${myReactedFire ? '#F26419' : '#6b7a73'}; font-weight:${myReactedFire ? 'bold' : 'normal'};">
                🔥 <span>${fireList.length}</span>
              </button>
            </div>
            
            <div style="font-size:11px; color:#8a877d; text-align:right;">
              ✍️ Bởi: <strong>${escapeHtml(a.author)}</strong> · 📞 <a href="tel:${escapeHtml(a.phone)}" style="color:#0C447C; font-weight:500;">${escapeHtml(a.phone)}</a>
              ${a.expireDate ? ` · ⏳ Hạn: ${formatDate(a.expireDate)}` : ''}
            </div>
          </div>
          
          ${canManage() ? `<button class="bc-btn danger small" id="ann-del-${a.id}" style="position:absolute; top:8px; right:8px; padding:2px 6px; font-size:10px;">Xóa</button>` : ''}
        </div>`);
        annListContainer.appendChild(item);
      });
    }
    wrap.appendChild(bulletinCard);

    // --- RENDER LỊCH HOẠT ĐỘNG SẮP TỚI (TÓM TẮT ĐẸP NHƯ HÌNH MẪU) ---
    const upcomingSessions = state.sessions
      .filter(s => (s.date + (s.time||'00:00')) >= nowStamp)
      .sort((a,b) => (a.date+a.time).localeCompare(b.date+b.time));

    if (upcomingSessions.length > 0) {
      const nearest = upcomingSessions[0];
      const yesVoters = Object.entries(nearest.votes).filter(([,v]) => v === 'yes').map(([name]) => name);
      const nearestCourt = state.courts.find(c => c.id === nearest.courtId);
      
      const summaryCard = el(`<div class="bc-card" style="background:#1E1E24; border:none; border-left:6px solid #F26419; border-radius:12px; padding:16px; color:#FAF8F5; margin-bottom:1rem; box-shadow:0 4px 15px rgba(0,0,0,0.15);">

          📢 Lịch hoạt động sắp tới
        </div>
